<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>김치 Phytate 스터디 퀴즈</title>
<style>
  :root { --bg:#fff7f0; --card:#ffffff; --line:#f0d9c8; --red:#c0392b; --green:#1e8449; --accent:#d35400; --ink:#2b2b2b; --muted:#7a6f68; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Malgun Gothic','맑은 고딕',system-ui,sans-serif; background:var(--bg); color:var(--ink); line-height:1.6; }
  .wrap { max-width:680px; margin:0 auto; padding:24px 18px 60px; }
  header h1 { font-size:1.5rem; margin:.2em 0; color:var(--accent); }
  header p { margin:.2em 0; color:var(--muted); font-size:.95rem; }
  .bar { height:10px; background:var(--line); border-radius:99px; overflow:hidden; margin:18px 0; }
  .bar > div { height:100%; width:0; background:var(--accent); transition:width .3s; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:22px; box-shadow:0 2px 10px rgba(180,120,60,.06); }
  .qmeta { font-size:.8rem; color:var(--muted); letter-spacing:.05em; }
  .q { font-size:1.18rem; font-weight:700; margin:8px 0 18px; }
  .choices { display:flex; flex-direction:column; gap:10px; }
  button.choice { text-align:left; padding:14px 16px; border:1.5px solid var(--line); border-radius:10px; background:#fff; font-size:1rem; cursor:pointer; transition:.15s; }
  button.choice:hover:not(:disabled) { border-color:var(--accent); background:#fff3e9; }
  button.choice:disabled { cursor:default; }
  button.choice.correct { border-color:var(--green); background:#e8f8ef; font-weight:700; }
  button.choice.wrong { border-color:var(--red); background:#fdecea; }
  .why { margin-top:16px; padding:14px 16px; border-left:4px solid var(--accent); background:#fff3e9; border-radius:0 8px 8px 0; font-size:.95rem; display:none; }
  .why.show { display:block; }
  .why b { color:var(--accent); }
  .nav { display:flex; justify-content:space-between; align-items:center; margin-top:20px; gap:10px; }
  .btn { padding:12px 20px; border:none; border-radius:10px; background:var(--accent); color:#fff; font-size:1rem; font-weight:700; cursor:pointer; }
  .btn:disabled { background:#e3cdbd; cursor:default; }
  .btn.ghost { background:#fff; color:var(--accent); border:1.5px solid var(--accent); }
  .score { text-align:center; }
  .score .big { font-size:3rem; font-weight:800; color:var(--accent); }
  .tag { display:inline-block; font-size:.72rem; padding:2px 9px; border-radius:99px; background:#fbe4d3; color:var(--accent); margin-left:6px; vertical-align:middle; }
  footer { text-align:center; color:var(--muted); font-size:.8rem; margin-top:30px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🥬 김치 Phytate 스터디 퀴즈</h1>
    <p>논문(2013, 박성희) + 특허(KR101465547B1) 이해도 점검 · 총 <span id="total">0</span>문항</p>
  </header>
  <div class="bar"><div id="prog"></div></div>
  <div id="app"></div>
  <footer>출처: 한국식품영양과학회지 42(4):627–632(2013) · 특허 KR101465547B1 · 본 퀴즈는 학습용 자가점검</footer>
</div>

<script>
/* ===== 문제 데이터: 새 논문 노트가 생기면 여기에 추가 ===== */
const QUESTIONS = [
  { type:"mc", tag:"개념",
    q:"이 논문이 줄이려 한 ‘피트산(phytate)’은 우리 몸에 어떤 작용을 하나요?",
    choices:["철·아연·칼슘 같은 무기질의 흡수를 방해한다","장운동을 빠르게 한다","단맛을 낸다","유산균을 죽인다"],
    answer:0, why:"피트산은 무기질을 움켜쥐는 <b>항영양인자(antinutrient)</b>입니다. 그래서 줄이면 무기질 흡수가 좋아집니다." },

  { type:"mc", tag:"사실",
    q:"김치에서 골라낸, 피트산 분해 효소(phytase)를 잘 만드는 균주 이름은?",
    choices:["Lactococcus lactis WK11","Lactobacillus sakei Wikim001","Leuconostoc citreum","Bacillus subtilis"],
    answer:1, why:"48종 중 활성이 가장 센 B04를 16S rRNA로 동정해 <b>L. sakei Wikim001</b>로 명명했습니다." },

  { type:"mc", tag:"핵심숫자",
    q:"Wikim001로 처리했을 때 현미의 피트산은 대략 얼마나 줄었나요?",
    choices:["거의 그대로","약 10%","절반 이하(약 57%)","100% 완전 제거"],
    answer:2, why:"약 0.28 mM → 0.12 mM, <b>절반 이하(약 57%) 감소</b>(p&lt;0.05). 이게 보고서 핵심 숫자입니다." },

  { type:"mc", tag:"사실",
    q:"이 균이 피트산을 가장 잘 분해하는 조건(최적 pH·온도)은?",
    choices:["pH 2.0 / 60°C","pH 5.0~6.5 / 30~40°C","pH 8.0 / 10°C","pH 4.0 이하 / 50°C"],
    answer:1, why:"최적 pH <b>5.0~6.5</b>, 온도 <b>30~40°C</b>. pH 4.0 이하에서는 거의 분해되지 않았습니다." },

  { type:"ox", tag:"개념",
    q:"피트산을 줄이려고 화학 처리를 하면 영양소도 함께 파괴될 수 있다.",
    answer:true, why:"맞습니다. 그래서 <b>유산균 발효</b>로 자연스럽게 줄이는 방법을 연구한 것입니다." },

  { type:"mc", tag:"저자",
    q:"이 논문에서 박성희 박사의 위치와 소속이 바르게 짝지어진 것은?",
    choices:["공저자 / 경기대","제1저자 / 세계김치연구소","교신저자 / 대상F&F","제1저자 / 한국식품연구원 단독"],
    answer:1, why:"박성희 박사가 <b>제1저자</b>, 소속은 <b>세계김치연구소</b>입니다(차별화 포인트)." },

  { type:"ox", tag:"한계",
    q:"이 논문은 현미 피트산 감소뿐 아니라 사람의 무기질 흡수 개선까지 직접 증명했다.",
    answer:false, why:"아닙니다. 피트산 감소는 보였지만 <b>실제 흡수 개선은 후속 연구가 필요</b>하다고 논문이 밝혔습니다." },

  { type:"mc", tag:"특허",
    q:"짝꿍 특허 KR101465547B1의 핵심 내용은?",
    choices:["김치 포장재 기술","같은 균주 Wikim001로 발효현미를 만드는 제조방법","김치냉장고 온도 제어","고춧가루 살균법"],
    answer:1, why:"논문이 발견한 <b>같은 균주 Wikim001</b>(기탁 KFCC11542P)로 <b>발효현미 제조방법</b>을 권리화한 특허입니다." },

  { type:"mc", tag:"스토리",
    q:"이 보고서의 ‘논문→특허’ 스토리를 가장 잘 요약한 것은?",
    choices:["서로 다른 회사가 우연히 같은 결과를 냄","같은 연구소가 균주 발견(논문 2013)→상품화(특허 2014)로 이었다","특허가 먼저 나오고 논문이 반박했다","둘은 관련이 없다"],
    answer:1, why:"세계김치연구소/한국식품연구원이 <b>같은 균주</b>로 발견→특허화한, 1장에 딱 맞는 연결입니다." },

  { type:"ox", tag:"확장",
    q:"같은 균주로 만든 발효현미가 골다공증 모델 쥐의 골밀도를 개선했다는 후속 연구도 있다.",
    answer:true, why:"맞습니다(Food Sci Biotechnol, 2015). 건강 효과로 이야기를 넓힐 근거가 됩니다." },
];
/* ===================================================== */

let idx = 0, score = 0, answered = false;
const app = document.getElementById('app');
document.getElementById('total').textContent = QUESTIONS.length;

function render() {
  const item = QUESTIONS[idx];
  document.getElementById('prog').style.width = (idx / QUESTIONS.length * 100) + '%';
  answered = false;
  const choices = item.type === 'ox' ? ['⭕ 맞다 (O)','❌ 아니다 (X)'] : item.choices;
  app.innerHTML = `
    <div class="card">
      <div class="qmeta">문제 ${idx+1} / ${QUESTIONS.length}<span class="tag">${item.tag}</span></div>
      <div class="q">${item.q}</div>
      <div class="choices" id="choices">
        ${choices.map((c,i)=>`<button class="choice" data-i="${i}">${c}</button>`).join('')}
      </div>
      <div class="why" id="why"></div>
      <div class="nav">
        <span></span>
        <button class="btn" id="next" disabled>다음 ▶</button>
      </div>
    </div>`;
  document.querySelectorAll('.choice').forEach(b => b.addEventListener('click', pick));
  document.getElementById('next').addEventListener('click', next);
}

function correctIndex(item){ return item.type==='ox' ? (item.answer?0:1) : item.answer; }

function pick(e) {
  if (answered) return;
  answered = true;
  const item = QUESTIONS[idx];
  const chosen = +e.target.dataset.i;
  const correct = correctIndex(item);
  document.querySelectorAll('.choice').forEach((b,i)=>{
    b.disabled = true;
    if (i === correct) b.classList.add('correct');
    if (i === chosen && chosen !== correct) b.classList.add('wrong');
  });
  if (chosen === correct) score++;
  const why = document.getElementById('why');
  why.innerHTML = (chosen===correct ? '✅ 정답! ' : '❌ 오답. ') + item.why;
  why.classList.add('show');
  document.getElementById('next').disabled = false;
}

function next() {
  idx++;
  if (idx < QUESTIONS.length) render();
  else finish();
}

function finish() {
  document.getElementById('prog').style.width = '100%';
  const pct = Math.round(score / QUESTIONS.length * 100);
  let msg = pct>=80 ? '훌륭해요! 보고서 쓸 준비 완료 👍' : pct>=50 ? '좋아요. 틀린 부분만 노트로 다시 봐요.' : '스터디 노트를 한 번 더 읽어볼까요?';
  app.innerHTML = `
    <div class="card score">
      <div class="big">${score} / ${QUESTIONS.length}</div>
      <p style="font-size:1.1rem;font-weight:700">${pct}점 · ${msg}</p>
      <div class="nav" style="justify-content:center">
        <button class="btn ghost" onclick="location.reload()">다시 풀기</button>
      </div>
    </div>`;
}

render();
</script>
</body>
</html>
